<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable and Operations</title>
    
    <script>
        let myString = "Achintha";
        let myNumber = 25;
        let myBoolean = true;
        myBoolean = false;
        let myNull = null;
        let myUndefined = undefined;
        let myObject = {
            name : "Achintha",
            age : 23
        }

        let myArray = [1,2,3,4,5,6,7]
        let myFunction = function(){
            console.log("test");
        }

        //console.log(typeof myString);
        //console.log(typeof 5.4566);

        //Operations
        let a = 10;
        let b = 20;
        let c = a+b;

        console.log(c);
        console.log(a/2);
        console.log(a*b);
        console.log(10%3);

        console.log(a);
        a++;
        console.log(a);
        a++;
        console.log(a);
        a--;
        console.log(a);

        let firstName = "Achintha";
        let lastName = "Bandara";

        let fullName = firstName +" " + lastName;
        console.log(fullName);
        console.log(firstName - lastName);

        a += 10;
        console.log(a); 

        // Comparison Operations

        let x = 10;
        let y = 10;
        console.log(x==y);
        console.log(x!=y);
        console.log(x>y);
        console.log(x<y);
        console.log(x>=y);

        let b1 = true;
        let b2 = false;

        //AND
        console.log(b1&&b2);

        //OR
        console.log(b1||b2);

        //NOT
        console.log(b1 && !b2);

    </script>

</head>
<body>
    
</body>
</html>
